
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Learning for Delaney</title>
    <style>
        :root {
            --pink-dark: #2d1b2e;
            --pink-mid: #3d2544;
            --pink-soft: #563d5f;
            --pink-accent: #ec4899;
            --pink-hover: #db2777;
            --pink-light: #fce7f3;
            --pink-muted: #f9a8d4;
            --pink-faint: #f0abfc;
            --pink-warn: #fb7185;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--pink-dark);
            color: var(--pink-light);
            min-height: 100vh;
            padding: 24px 16px 80px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 720px; margin: 0 auto; width: 100%; flex: 1; }
        header { text-align: center; margin-bottom: 28px; }
        header h1 { font-size: 1.8rem; color: var(--pink-accent); margin-bottom: 6px; }
        header p { color: var(--pink-faint); font-size: 0.9rem; }
        .input-card {
            background: var(--pink-mid);
            border-radius: 16px; padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .input-card label {
            display: block; color: var(--pink-muted);
            font-size: 0.85rem; font-weight: 600;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
        }
        textarea {
            width: 100%; padding: 14px 16px;
            border: 2px solid var(--pink-soft); border-radius: 10px;
            background: var(--pink-dark); color: var(--pink-light);
            font-size: 1.05rem; resize: none; min-height: 90px;
            transition: border-color 0.2s; font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--pink-accent); }
        textarea::placeholder { color: var(--pink-soft); }
        .ask-btn {
            margin-top: 14px; width: 100%; padding: 14px;
            background: var(--pink-accent); color: #fff; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .ask-btn:hover { background: var(--pink-hover); transform: translateY(-1px); }
        .ask-btn:disabled { background: var(--pink-soft); cursor: not-allowed; transform: none; }
        .spinner {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .examples-label {
            color: var(--pink-faint); font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.06em;
            font-weight: 600; margin: 16px 0 8px;
        }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            background: var(--pink-mid); border: 1px solid var(--pink-soft);
            color: var(--pink-muted); padding: 6px 14px;
            border-radius: 20px; font-size: 0.82rem; cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { background: var(--pink-soft); color: var(--pink-light); border-color: var(--pink-accent); }
        .conversation { display: flex; flex-direction: column; gap: 18px; }
        .bubble-row { display: flex; align-items: flex-end; gap: 12px; }
        .bubble-row.english { flex-direction: row; }
        .bubble-row.spanish { flex-direction: row-reverse; }
        .avatar {
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .eng-avatar { background: #3b4a6b; }
        .esp-avatar { background: #6b2b4a; }
        .bubble { max-width: 78%; padding: 16px 20px; border-radius: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.25); }
        .english-bubble { background: #2a3a5c; border-bottom-left-radius: 4px; }
        .spanish-bubble { background: #5c1a3a; border-bottom-right-radius: 4px; }
        .bubble-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .english-bubble .bubble-label { color: #93c5fd; }
        .spanish-bubble .bubble-label { color: var(--pink-muted); }
        .bubble-text { font-size: 1.15rem; line-height: 1.5; }
        .english-bubble .bubble-text { color: #e0eaff; }
        .spanish-bubble .bubble-text { color: var(--pink-light); font-weight: 500; }
        .bubble-note { margin-top: 8px; font-size: 0.78rem; color: var(--pink-faint); font-style: italic; }
        .speak-btn {
            margin-top: 10px; padding: 6px 14px;
            background: transparent; border: 1px solid var(--pink-muted);
            color: var(--pink-muted); border-radius: 20px;
            font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
        }
        .speak-btn:hover { background: var(--pink-soft); color: var(--pink-light); }
        .loading-text { color: var(--pink-faint); font-style: italic; animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .placeholder-msg { text-align: center; color: var(--pink-soft); font-style: italic; padding: 40px 20px; font-size: 0.95rem; }
        .clear-btn {
            width: 100%; padding: 10px; background: transparent;
            border: 1px solid var(--pink-soft); color: var(--pink-muted);
            border-radius: 8px; font-size: 0.85rem; cursor: pointer;
            margin-top: 20px; transition: all 0.2s;
        }
        .clear-btn:hover { border-color: var(--pink-warn); color: var(--pink-warn); }
        .page-footer {
            text-align: center; padding: 18px 16px;
            color: var(--pink-faint); font-size: 0.85rem;
            border-top: 1px solid var(--pink-soft); margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>&#127466;&#127480; Spanish Learning for Delaney &#128118;&#128149;</h1>
        <p>Type anything in English and hear it in Spanish! &#127868;&#10024;</p>
    </header>

    <div class="input-card">
        <label>Type anything in English:</label>
        <textarea id="englishInput" placeholder="Type any sentence, question, or phrase..."></textarea>
        <button class="ask-btn" id="askBtn" onclick="translate()">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">&#128172; Say it in Spanish!</span>
        </button>
        <div class="examples-label">Quick examples &mdash; tap to try:</div>
        <div class="chips" id="chips"></div>
    </div>

    <div class="conversation" id="conversation">
        <div class="placeholder-msg" id="placeholder">
            &#127872; Type anything above and I'll translate it into Spanish! &#127466;&#127480;
        </div>
    </div>

    <button class="clear-btn" onclick="clearAll()">&#128465; Clear conversation</button>
</div>

<div class="page-footer">
    &#127760; Powered by live translation &mdash; translates any sentence you type, instantly!
</div>

<script>
var examples = [
    "If I'm going to graduate high school early this year, I'm really going to have to study hard with this Spanish!",
    "What time do you have to go to work tonight?",
    "Where is the baby?",
    "Are you hungry?",
    "Can you help me please?",
    "I love you so much!",
    "Good morning, how are you?",
    "It is time to go to sleep.",
    "Do you want something to eat?",
    "I need to change your diaper.",
    "Let's play together!",
    "What is your favorite color?"
];

function esc(s) {
    return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
}

function setLoading(on) {
    document.getElementById("askBtn").disabled = on;
    document.getElementById("spinner").style.display = on ? "block" : "none";
    document.getElementById("btnText").textContent = on ? "Translating..." : String.fromCodePoint(0x1F4AC) + " Say it in Spanish!";
}

function speakSpanish(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = "es-ES";
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
}

async function translate() {
    var input = document.getElementById("englishInput").value.trim();
    if (!input) return;

    var ph = document.getElementById("placeholder");
    if (ph) ph.remove();

    var conv = document.getElementById("conversation");

    var engRow = document.createElement("div");
    engRow.className = "bubble-row english";
    engRow.innerHTML =
        "<div class=\"avatar eng-avatar\">&#128587;</div>" +
        "<div class=\"bubble english-bubble\">" +
          "<div class=\"bubble-label\">English</div>" +
          "<div class=\"bubble-text\">" + esc(input) + "</div>" +
        "</div>";
    conv.appendChild(engRow);

    var espRow = document.createElement("div");
    espRow.className = "bubble-row spanish";
    espRow.innerHTML =
        "<div class=\"avatar esp-avatar\">&#128131;</div>" +
        "<div class=\"bubble spanish-bubble\">" +
          "<div class=\"bubble-label\">En Espa&#241;ol &#127466;&#127480;</div>" +
          "<div class=\"bubble-text loading-text\">Translating&#8230;</div>" +
        "</div>";
    conv.appendChild(espRow);
    espRow.scrollIntoView({ behavior: "smooth", block: "end" });

    document.getElementById("englishInput").value = "";
    setLoading(true);

    try {
        var url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(input) + "&langpair=en|es";
        var res = await fetch(url);
        var data = await res.json();
        var translated = (data && data.responseStatus === 200 && data.responseData)
            ? data.responseData.translatedText : null;

        var bubbleEl = espRow.querySelector(".bubble");
        if (translated) {
            bubbleEl.innerHTML =
                "<div class=\"bubble-label\">En Espa&#241;ol &#127466;&#127480;</div>" +
                "<div class=\"bubble-text\">" + esc(translated) + "</div>" +
                "<div class=\"bubble-note\">&#128162; Live translation &bull; Auto-spoken in Spanish</div>" +
                "<button class=\"speak-btn\" onclick=\"speakSpanish(" + JSON.stringify(translated) + ")\">&#128266; Hear it again</button>";
            speakSpanish(translated);
        } else {
            bubbleEl.innerHTML =
                "<div class=\"bubble-label\">En Espa&#241;ol &#127466;&#127480;</div>" +
                "<div class=\"bubble-text\" style=\"color:var(--pink-warn)\">&#9888; Translation failed. Check your internet and try again.</div>";
        }
    } catch(err) {
        espRow.querySelector(".bubble").innerHTML =
            "<div class=\"bubble-label\">En Espa&#241;ol &#127466;&#127480;</div>" +
            "<div class=\"bubble-text\" style=\"color:var(--pink-warn)\">&#9888; Could not reach the translation service. Make sure you're connected to the internet.</div>";
    }

    setLoading(false);
    espRow.scrollIntoView({ behavior: "smooth", block: "end" });
}

function clearAll() {
    document.getElementById("conversation").innerHTML =
        "<div class=\"placeholder-msg\" id=\"placeholder\">&#127872; Type anything above and I'll translate it into Spanish! &#127466;&#127480;</div>";
}

var chipsEl = document.getElementById("chips");
examples.forEach(function(phrase) {
    var btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = phrase;
    btn.onclick = function() {
        document.getElementById("englishInput").value = phrase;
        translate();
    };
    chipsEl.appendChild(btn);
});

document.getElementById("englishInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); translate(); }
});
</script>
</body>
</html>
